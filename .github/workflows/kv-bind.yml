name: Auto Bind KV after Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  bind-kv:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Bind KV to Worker
        run: |
          echo "========================================="
          echo "步骤1：获取 Worker 当前绑定和脚本"
          echo "========================================="
          
          # 1. 获取当前 Worker 的完整信息（包含绑定和脚本）
          echo "正在获取 Worker 当前配置..."
          
          WORKER_INFO=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/services/${{ secrets.WORKER_NAME }}" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json")
          
          echo "Worker 信息获取结果："
          echo "$WORKER_INFO" | jq -r '.success'
          
          # 2. 提取现有绑定
          EXISTING_BINDINGS=$(echo "$WORKER_INFO" | jq -r '.result.bindings // []')
          echo ""
          echo "现有绑定："
          echo "$EXISTING_BINDINGS" | jq '.'
          
          # 3. 构建新的绑定列表
          if [ "$EXISTING_BINDINGS" = "null" ] || [ "$EXISTING_BINDINGS" = "[]" ]; then
            echo "当前没有绑定，将创建新绑定"
            UPDATED_BINDINGS=$(jq -n --arg kv_id "${{ secrets.KV_NAMESPACE_ID }}" --arg kv_name "${{ secrets.KV_BINDING_NAME }}" '
              [{
                "type": "kv_namespace",
                "name": $kv_name,
                "namespace_id": $kv_id
              }]
            ')
          else
            echo "已有绑定，将合并 KV 绑定"
            UPDATED_BINDINGS=$(echo "$EXISTING_BINDINGS" | jq --arg kv_id "${{ secrets.KV_NAMESPACE_ID }}" --arg kv_name "${{ secrets.KV_BINDING_NAME }}" '
              map(select(.type != "kv_namespace")) 
              | . + [{
                  "type": "kv_namespace",
                  "name": $kv_name,
                  "namespace_id": $kv_id
                }]
            ')
          fi
          
          echo ""
          echo "更新后的绑定："
          echo "$UPDATED_BINDINGS" | jq '.'
          
          # 4. 提取当前脚本内容（需要用于后续 PUT）
          echo ""
          echo "========================================="
          echo "步骤2：获取当前 Worker 脚本"
          echo "========================================="
          
          SCRIPT_RESPONSE=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/services/${{ secrets.WORKER_NAME }}/environments/production/content" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}")
          
          # 保存脚本到文件
          echo "$SCRIPT_RESPONSE" > worker-script.js
          
          SCRIPT_SIZE=$(wc -c < worker-script.js)
          echo "获取到脚本，大小：${SCRIPT_SIZE} 字节"
          
          # 5. 构建绑定和元数据 JSON
          echo ""
          echo "========================================="
          echo "步骤3：更新 Worker 绑定"
          echo "========================================="
          
          # 构建 metadata JSON（包含 bindings）
          METADATA=$(jq -n --argjson bindings "$UPDATED_BINDINGS" '{
            bindings: $bindings,
            compatibility_date: "2025-11-04",
            compatibility_flags: []
          }')
          
          echo "元数据："
          echo "$METADATA" | jq '.'
          
          # 使用 multipart/form-data 方式上传脚本和绑定
          echo ""
          echo "正在上传 Worker 脚本和绑定配置..."
          
          # 创建临时文件用于 multipart 上传
          echo "$METADATA" > metadata.json
          
          UPDATE_RESPONSE=$(curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/services/${{ secrets.WORKER_NAME }}/environments/production" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -F "script=@worker-script.js;type=application/javascript+module" \
            -F "metadata=@metadata.json;type=application/json")
          
          echo "更新结果："
          echo "$UPDATE_RESPONSE" | jq '.'
          
          UPDATE_SUCCESS=$(echo "$UPDATE_RESPONSE" | jq -r '.success')
          if [ "$UPDATE_SUCCESS" = "true" ]; then
            echo ""
            echo "✅✅✅ KV 绑定成功！Worker 已更新！"
          else
            echo ""
            echo "❌❌❌ 更新失败"
            echo "$UPDATE_RESPONSE" | jq -r '.errors'
            exit 1
          fi

      - name: Verify KV Binding
        run: |
          echo ""
          echo "========================================="
          echo "步骤4：验证 KV 绑定"
          echo "========================================="
          
          VERIFY_RESPONSE=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/services/${{ secrets.WORKER_NAME }}" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json")
          
          echo "当前 Worker 绑定："
          echo "$VERIFY_RESPONSE" | jq '.result.bindings'
          
          HAS_KV=$(echo "$VERIFY_RESPONSE" | jq -r '.result.bindings[]? | select(.type == "kv_namespace" and .namespace_id == "${{ secrets.KV_NAMESPACE_ID }}") | .name')
          
          if [ -n "$HAS_KV" ]; then
            echo ""
            echo "✅✅✅ 验证成功！KV 绑定变量名：$HAS_KV，命名空间 ID：${{ secrets.KV_NAMESPACE_ID }}"
          else
            echo ""
            echo "❌❌❌ 验证失败：未找到 KV 绑定"
            exit 1
          fi
