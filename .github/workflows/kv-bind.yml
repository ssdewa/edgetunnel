name: Auto Bind KV after Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  bind-kv:
    runs-on: ubuntu-latest
    
    steps:
      - name: Bind KV to Worker
        run: |
          echo "========================================="
          echo "正在为 Worker 绑定 KV 命名空间"
          echo "========================================="
          
          NEW_KV_BINDINGS=$(jq -n --arg kv_id "${{ secrets.KV_NAMESPACE_ID }}" --arg kv_name "${{ secrets.KV_BINDING_NAME }}" '
            [{
              "type": "kv_namespace",
              "name": $kv_name,
              "namespace_id": $kv_id
            }]
          ')
          
          echo "绑定配置："
          echo "$NEW_KV_BINDINGS" | jq '.'
          
          BINDING_RESPONSE=$(curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/${{ secrets.WORKER_NAME }}/bindings/kv_namespaces" \
            -H "X-Auth-Email: ${{ secrets.CF_EMAIL }}" \
            -H "X-Auth-Key: ${{ secrets.CF_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$NEW_KV_BINDINGS")
          
          echo ""
          echo "API 响应："
          echo "$BINDING_RESPONSE" | jq '.'
          
          SUCCESS=$(echo "$BINDING_RESPONSE" | jq -r '.success')
          if [ "$SUCCESS" = "true" ]; then
            echo ""
            echo "✅✅✅ KV 绑定成功！"
          else
            echo ""
            echo "❌❌❌ 绑定失败"
            echo "$BINDING_RESPONSE" | jq -r '.errors'
            exit 1
          fi

      - name: Verify KV Binding
        run: |
          echo ""
          echo "========================================="
          echo "验证绑定结果"
          echo "========================================="
          
          VERIFY_RESPONSE=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/services/${{ secrets.WORKER_NAME }}" \
            -H "X-Auth-Email: ${{ secrets.CF_EMAIL }}" \
            -H "X-Auth-Key: ${{ secrets.CF_API_KEY }}" \
            -H "Content-Type: application/json")
          
          echo "当前所有绑定："
          echo "$VERIFY_RESPONSE" | jq '.result.bindings'
          
          FOUND=$(echo "$VERIFY_RESPONSE" | jq -r --arg ns_id "${{ secrets.KV_NAMESPACE_ID }}" '.result.bindings[]? | select(.namespace_id == $ns_id) | .name')
          
          if [ -n "$FOUND" ]; then
            echo ""
            echo "✅✅✅ 验证成功！变量名：$FOUND"
          else
            echo ""
            echo "❌❌❌ 未找到绑定"
            exit 1
          fi
