name: Auto Bind KV after Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  bind-kv:
    runs-on: ubuntu-latest
    
    steps:
      - name: Install wrangler
        run: npm install -g wrangler

      - name: Download Worker Script and Deploy with KV Binding
        run: |
          echo "========================================="
          echo "步骤1：下载当前 Worker 脚本"
          echo "========================================="
          
          # 用 API 下载当前 Worker 脚本
          curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/services/${{ secrets.WORKER_NAME }}/environments/production/content" \
            -H "X-Auth-Email: ${{ secrets.CF_EMAIL }}" \
            -H "X-Auth-Key: ${{ secrets.CF_API_KEY }}" \
            -o _worker.js
          
          SCRIPT_SIZE=$(wc -c < _worker.js)
          echo "下载完成，脚本大小：${SCRIPT_SIZE} 字节"
          
          echo ""
          echo "========================================="
          echo "步骤2：创建 wrangler.toml 配置文件"
          echo "========================================="
          
          cat > wrangler.toml << EOF
          name = "${{ secrets.WORKER_NAME }}"
          main = "_worker.js"
          compatibility_date = "2025-11-04"
          
          [[kv_namespaces]]
          binding = "${{ secrets.KV_BINDING_NAME }}"
          id = "${{ secrets.KV_NAMESPACE_ID }}"
          EOF
          
          echo "wrangler.toml 内容："
          cat wrangler.toml
          
          echo ""
          echo "========================================="
          echo "步骤3：部署 Worker（含 KV 绑定）"
          echo "========================================="
          
          CLOUDFLARE_API_KEY="${{ secrets.CF_API_KEY }}" \
          CLOUDFLARE_EMAIL="${{ secrets.CF_EMAIL }}" \
          npx wrangler deploy \
            --config wrangler.toml \
            --name "${{ secrets.WORKER_NAME }}"
          
          if [ $? -eq 0 ]; then
            echo ""
            echo "✅✅✅ 部署成功！KV 绑定已生效！"
          else
            echo ""
            echo "❌❌❌ 部署失败"
            exit 1
          fi

      - name: Verify KV Binding
        run: |
          echo ""
          echo "========================================="
          echo "步骤4：验证 KV 绑定"
          echo "========================================="
          
          VERIFY_RESPONSE=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/services/${{ secrets.WORKER_NAME }}" \
            -H "X-Auth-Email: ${{ secrets.CF_EMAIL }}" \
            -H "X-Auth-Key: ${{ secrets.CF_API_KEY }}" \
            -H "Content-Type: application/json")
          
          echo "当前所有绑定："
          echo "$VERIFY_RESPONSE" | jq '.result.bindings'
          
          FOUND=$(echo "$VERIFY_RESPONSE" | jq -r --arg ns_id "${{ secrets.KV_NAMESPACE_ID }}" '.result.bindings[]? | select(.namespace_id == $ns_id) | .name')
          
          if [ -n "$FOUND" ]; then
            echo ""
            echo "✅✅✅ 验证成功！KV 绑定变量名：$FOUND"
          else
            echo ""
            echo "❌❌❌ 未找到 KV 绑定"
            exit 1
          fi
