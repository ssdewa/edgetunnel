name: Auto Bind KV after Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  bind-kv:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Bind KV to Worker
        run: |
          echo "========================================="
          echo "步骤1：直接更新 Worker 绑定配置"
          echo "========================================="
          
          echo "正在获取现有 Worker 环境配置..."
          
          GET_RESPONSE=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/services/${{ secrets.WORKER_NAME }}/environments/production" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json")
          
          echo "获取到的环境配置："
          echo "$GET_RESPONSE" | jq '.'
          
          EXISTING_BINDINGS=$(echo "$GET_RESPONSE" | jq -r '.result.bindings // []')
          
          echo ""
          echo "现有绑定：$EXISTING_BINDINGS"
          
          if [ "$EXISTING_BINDINGS" = "null" ] || [ "$EXISTING_BINDINGS" = "[]" ]; then
            echo "当前没有绑定，将创建新绑定"
            NEW_BINDINGS=$(jq -n --arg kv_id "${{ secrets.KV_NAMESPACE_ID }}" --arg kv_name "${{ secrets.KV_BINDING_NAME }}" '
              [{
                "type": "kv_namespace",
                "name": $kv_name,
                "namespace_id": $kv_id
              }]
            ')
          else
            echo "已有绑定，将合并 KV 绑定"
            NEW_BINDINGS=$(echo "$EXISTING_BINDINGS" | jq --arg kv_id "${{ secrets.KV_NAMESPACE_ID }}" --arg kv_name "${{ secrets.KV_BINDING_NAME }}" '
              map(select(.type != "kv_namespace")) 
              | . + [{
                  "type": "kv_namespace",
                  "name": $kv_name,
                  "namespace_id": $kv_id
                }]
            ')
          fi
          
          echo ""
          echo "新的绑定配置："
          echo "$NEW_BINDINGS" | jq '.'
          
          echo ""
          echo "========================================="
          echo "步骤2：更新 Worker 绑定"
          echo "========================================="
          
          PUT_BODY=$(jq -n --argjson bindings "$NEW_BINDINGS" '{bindings: $bindings}')
          
          echo "请求体："
          echo "$PUT_BODY" | jq '.'
          
          PUT_RESPONSE=$(curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/services/${{ secrets.WORKER_NAME }}/environments/production" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$PUT_BODY")
          
          echo "更新结果："
          echo "$PUT_RESPONSE" | jq '.'
          
          PUT_SUCCESS=$(echo "$PUT_RESPONSE" | jq -r '.success')
          if [ "$PUT_SUCCESS" = "true" ]; then
            echo ""
            echo "✅✅✅ KV 绑定成功！"
          else
            echo ""
            echo "❌❌❌ KV 绑定失败"
            echo "$PUT_RESPONSE" | jq -r '.errors'
            exit 1
          fi

      - name: Verify KV Binding
        run: |
          echo ""
          echo "========================================="
          echo "步骤3：验证 KV 绑定"
          echo "========================================="
          
          VERIFY_RESPONSE=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/services/${{ secrets.WORKER_NAME }}/environments/production" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json")
          
          echo "当前环境绑定："
          echo "$VERIFY_RESPONSE" | jq '.result.bindings'
          
          HAS_KV=$(echo "$VERIFY_RESPONSE" | jq -r '.result.bindings[]? | select(.namespace_id == "${{ secrets.KV_NAMESPACE_ID }}") | .namespace_id')
          
          if [ -n "$HAS_KV" ]; then
            echo ""
            echo "✅✅✅ 验证成功：KV 命名空间 ${{ secrets.KV_NAMESPACE_ID }} 已正确绑定！"
          else
            echo ""
            echo "❌❌❌ 验证失败：未找到指定的 KV 绑定"
            exit 1
          fi
